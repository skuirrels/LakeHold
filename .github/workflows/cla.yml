# Contributor License Agreement check.
#
# Blocks a pull request until every contributor has agreed to the CLA (see CLA.md) by leaving
# the agreement comment on the PR. Signatures are stored in a JSON file in a dedicated branch
# of this repository, so there is no external service to trust.
#
# ── One-time setup before this works ──────────────────────────────────────────────────────
#   1. Create a repository secret named PERSONAL_ACCESS_TOKEN: a fine-grained or classic PAT
#      with `repo` scope (contents read/write). The action uses it to write the signatures
#      file. The built-in GITHUB_TOKEN is intentionally NOT reused for the signature store.
#   2. Fill in the [PROJECT OWNER] placeholder in CLA.md with your legal name or entity.
#   3. Merge this workflow to the default branch. The first PR after that will prompt for the
#      agreement comment.
#
# The signatures branch (`cla-signatures` below) is created automatically on first signing.
# ──────────────────────────────────────────────────────────────────────────────────────────

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA check
        # Runs on every PR, and when someone comments the agreement (or "recheck").
        if: >
          (github.event.comment.body == 'recheck' ||
           contains(github.event.comment.body, 'I hereby agree to the terms of the Lakehold Contributor License Agreement')) ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # The exact sentence a contributor must comment to sign.
          custom-pr-signatures: 'I hereby agree to the terms of the Lakehold Contributor License Agreement'
          # Where the record of who signed is kept.
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/skuirrels/LakeHold/blob/main/CLA.md'
          branch: 'cla-signatures'
          # Bots and the owner never need to sign.
          allowlist: 'skuirrels,dependabot[bot],*[bot]'
          custom-notsigned-prcomment: >
            Thank you for your pull request. Before it can be merged, please read our
            [Contributor License Agreement](https://github.com/skuirrels/LakeHold/blob/main/CLA.md)
            and, if you agree, post a new comment on this pull request containing exactly:
          custom-allsigned-prcomment: >
            All contributors have signed the CLA. Thank you.
