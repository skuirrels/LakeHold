<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Lakehold">
  <!--
    Lakehold mark: three level waves — a lake, held. No duck.

    An opaque rounded tile in the brand yellow carries three identical, evenly spaced waves in the
    darkest surface colour. Equal amplitude (not tapering) reads as calm water rather than a signal
    meter, and the dark-on-yellow contrast holds on both light and dark browser tab bars. The waves
    are drawn as explicit quadratic segments (each Q starts where the last ended) rather than a
    smooth-reflection T chain, which rendered a seam in the middle wave on some engines.
  -->
  <rect width="32" height="32" rx="7" fill="#ffc857"/>
  <path d="M6 10.5 Q8.5 8.3 11 10.5 Q13.5 12.7 16 10.5 Q18.5 8.3 21 10.5 Q23.5 12.7 26 10.5" stroke="#0b0f14" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M6 16 Q8.5 13.8 11 16 Q13.5 18.2 16 16 Q18.5 13.8 21 16 Q23.5 18.2 26 16" stroke="#0b0f14" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M6 21.5 Q8.5 19.3 11 21.5 Q13.5 23.7 16 21.5 Q18.5 19.3 21 21.5 Q23.5 23.7 26 21.5" stroke="#0b0f14" stroke-width="2.4" fill="none" stroke-linecap="round"/>
</svg>
