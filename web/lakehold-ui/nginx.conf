# Serves the built Angular bundle and proxies the API on the same origin.
#
# Same-origin is the point: it removes CORS from the production deployment entirely, and it means the
# browser only ever needs one published port. The API container does not have to be reachable from
# outside the compose network at all.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Never build an absolute redirect. nginx would compose one from `listen` and `server_name`,
    # which behind TLS termination means redirecting https://lakehold.dev/docs to
    # http://lakehold.dev:8080/docs/ — downgrading the scheme and publishing the internal port. A
    # relative Location keeps whatever scheme, host, and port the client actually used.
    absolute_redirect off;

    # Angular owns the routes. The marketing routes (/, /compare, /docs) are prerendered to their
    # own index.html and served directly by the first try_files clauses. Everything else — the
    # client-rendered workbench and any unknown path the router resolves in-app — falls back to the
    # client shell, never to a prerendered page, whose hydrated markup would not match the route.
    #
    # `$uri/index.html` comes before `$uri/`, and that ordering is the whole point: `$uri/` matches
    # the prerendered directory and makes nginx 301 to the trailing-slash form, so /docs answered a
    # redirect while every page's own rel="canonical" named /docs. Google resolves a canonical that
    # redirects by picking some other URL as canonical, which is how the marketing pages end up
    # indexed under a URL nobody chose. Serving the directory's index.html directly returns 200 at
    # the canonical URL, and the two signals finally agree.
    location / {
        try_files $uri $uri/index.html $uri/ /index.csr.html;
    }

    location /api/ {
        proxy_pass         http://api:5200;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Query results stream and a large one legitimately takes minutes; the default 60s would cut
        # a working query off at the proxy and report it to the user as a server error.
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    location /health {
        proxy_pass http://api:5200/health;
    }

    # Fingerprinted build output is immutable; index.html must never be, or a deploy is invisible
    # until every client clears its cache.
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Every HTML entry point — the prerendered marketing pages and the client shell alike —
    # references fingerprinted bundles and must never be cached, or a deploy is invisible until
    # each client clears its cache.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    gzip             on;
    gzip_types       text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length  1024;
}
