  <!--
    ICO first, SVG second. A browser that understands SVG icons takes the later, more specific
    declaration; one that does not ignores it and falls back to the ICO. Declaring them the other
    way round leaves legacy browsers (Safari before 16.4) on the raster copy anyway but costs
    modern ones a needless request.
  -->
  <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#ffc857">
</head>
